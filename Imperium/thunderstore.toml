[config]
schemaVersion = "0.0.1"

[general]
repository = "https://thunderstore.io"

[package]
namespace = "giosuel"
name = "Imperium"
description = "A powerful all-in-one debugging and admin tool to test and explore game mechanics and functionality in Lethal Company."
websiteUrl = "https://github.com/giosuel/imperium"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack = "5.4.2305"
xilophor-LethalNetworkAPI = "3.3.3"
Rune580-LethalCompany_InputUtils = "0.7.13"
DiFFoZ-BepInEx_MonoMod_Debug_Patcher = "1.1.1"

[build]
icon = "../assets/icon_256x256.png"
readme = "../README.md"
outdir = "../artifacts/thunderstore/"

[[build.copy]]
source = "../artifacts/bin/Imperium/release/giosuel.Imperium.dll"
target = "/"

[[build.copy]]
source = "../CHANGELOG.md"
target = "/"

[[build.copy]]
source = "../LICENSE.md"
target = "/"

[publish]
communities = ["lethal-company"]

[publish.categories]
lethal-company = ["mods", "tools", "libraries", "misc", "bepinex", "serverside", "clientside", "bug-fixes", "performance", "tweaks-and-quality-of-life"]